<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error | BayanihanHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Manrope', sans-serif; background-color: #f4f5f8; color: #0f172a; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="flex h-screen items-center justify-center p-6 bg-gradient-to-br from-[#f4f5f8] to-[#ffe4e6] relative overflow-hidden">
    
    <!-- Floating Orbs Background -->
    <div class="absolute -top-32 -left-32 w-96 h-96 bg-rose-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
    <div class="absolute -bottom-32 -right-32 w-96 h-96 bg-orange-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse" style="animation-delay: 2s;"></div>
    
    <div class="bg-white/80 backdrop-blur-xl p-10 md:p-16 rounded-[3rem] shadow-2xl shadow-rose-500/10 border border-white max-w-lg w-full text-center relative z-10 animate-fade">
        <div class="w-24 h-24 bg-rose-100 rounded-[2rem] flex items-center justify-center mx-auto mb-6 transform -rotate-12 shadow-sm border border-rose-200">
            <span class="material-symbols-outlined text-5xl text-rose-600">engineering</span>
        </div>
        <h1 class="text-7xl font-black text-slate-800 mb-2 tracking-tighter">500</h1>
        <h2 class="text-2xl font-black text-rose-600 mb-4 tracking-tight">May konting aberya!</h2>
        <p class="text-slate-500 font-medium mb-8">Nasira 'yung makina natin sa likod (Internal Server Error). Ginagawa na ito ng ating mga tech tambays. Paki-refresh na lang mamaya!</p>
        <button onclick="window.location.reload()" class="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-rose-500 to-orange-500 text-white font-extrabold px-8 py-4 rounded-2xl shadow-lg shadow-rose-500/30 hover:scale-105 active:scale-95 transition-all w-full">
            <span class="material-symbols-outlined">refresh</span> Subukan Muli
        </button>
    </div>

</body>
</html>
